<html>
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes">
    <title>TorrBoard</title>

    <link rel="shortcut icon" href="https://media.balthazar.dev/statics/torrboard.ico" type="image/x-icon">
    <link rel="icon" href="https://media.balthazar.dev/statics/torrboard.ico" type="image/x-icon">

    <style>
      html, body {
        background-color: #1a1a1a;
      }

      body {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        color: #f5f5f5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        font-feature-settings: 'cv11', 'ss01', 'ss03';
      }

      *, *:after, *:before {
        box-sizing: border-box;
        font: inherit;
        color: inherit;
        margin: 0;
        padding: 0;
        border: none;
        outline: none;
      }

      #root > div {
        min-height: 100vh;
      }

      ::selection {
        background-color: rgba(6, 151, 255, 0.35);
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root" />
    <script type="module" src="./index.jsx"></script>
  </body>
</html>
